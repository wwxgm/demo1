name: Build iOS app

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Generate Flutter platform scaffolding
        run: flutter create --platforms=ios,android .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze without blocking IPA build
        run: flutter analyze
        continue-on-error: true

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package Runner.app artifact
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -r unsigned-autovi.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-autovi-ipa
          path: build/ios/iphoneos/unsigned-autovi.ipa
