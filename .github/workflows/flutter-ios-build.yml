name: Build iOS app

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Generate Flutter platform scaffolding
        run: |
          rm -rf ios android
          flutter create --platforms=ios,android .

      - name: Apply iOS native video implementation
        run: |
          cp ios_custom/Info.plist ios/Runner/Info.plist
          cp ios_custom/AppDelegate.swift ios/Runner/AppDelegate.swift

      - name: Set iOS deployment target
        run: |
          if [ -f ios/Podfile ]; then
            ruby -0777 -pi -e "gsub(/# platform :ios, '[^']+'/, \"platform :ios, '14.0'\")" ios/Podfile
            grep -n "platform :ios" ios/Podfile
          else
            echo "No ios/Podfile generated because this build has no CocoaPods plugins."
          fi
          ruby -0777 -pi -e "gsub(/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/, 'IPHONEOS_DEPLOYMENT_TARGET = 14.0;')" ios/Runner.xcodeproj/project.pbxproj

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze without blocking IPA build
        run: flutter analyze
        continue-on-error: true

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set +e
          flutter build ios --release --no-codesign 2>&1 | tee build-ios.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tail -n 80 build-ios.log | sed 's/%/%25/g; s/\r/%0D/g' | awk '{printf "%s%0A", $0}')
            echo "::error file=.github/workflows/flutter-ios-build.yml,line=36::${message}"
            exit "$status"
          fi

      - name: Package Runner.app artifact
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          COPYFILE_DISABLE=1 zip -r -X unsigned-autovi.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-autovi-ipa
          path: build/ios/iphoneos/unsigned-autovi.ipa
